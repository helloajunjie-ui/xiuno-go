services:
  mysql:
    image: mysql:8.0
    container_name: xiuno-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: xiuno
      MYSQL_USER: xiuno
      MYSQL_PASSWORD: xiuno123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - xiuno-net

  app:
    build:
      context: ..
      dockerfile: Xiuno/Dockerfile
    container_name: xiuno-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - xiuno-net

volumes:
  mysql-data:

networks:
  xiuno-net:
    driver: bridge
